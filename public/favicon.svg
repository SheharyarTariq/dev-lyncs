<svg viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head + neck silhouette — right-facing profile -->
  <path
    d="M22 84 L22 68
       C14 64 10 55 10 44
       C10 24 26 8 44 8
       C58 8 70 16 75 28
       C80 40 76 56 68 64
       C62 70 56 73 52 75
       L52 84 Z"
    fill="#0c1210"
  />

  <!-- Ear hint -->
  <path
    d="M10 42 C6 40 5 47 7 51 C9 55 13 53 12 49"
    stroke="#0c1210" stroke-width="4" stroke-linecap="round" fill="none"
  />

  <!-- Eye — small cream dot to suggest the face profile -->
  <circle cx="62" cy="36" r="2.5" fill="#fdf8f0" opacity="0.55"/>

  <!-- Brain — left hemisphere -->
  <ellipse cx="33" cy="32" rx="11" ry="10" fill="#0d9488"/>

  <!-- Brain — right hemisphere -->
  <ellipse cx="52" cy="32" rx="11" ry="10" fill="#0d9488"/>

  <!-- Brain centre divider (dark gap between hemispheres) -->
  <rect x="41" y="22" width="3" height="20" fill="#0c1210"/>

  <!-- Highlight folds on brain (darker teal, gives depth) -->
  <ellipse cx="30" cy="30" rx="5" ry="4" fill="#0a7c72" opacity="0.6"/>
  <ellipse cx="55" cy="30" rx="5" ry="4" fill="#0a7c72" opacity="0.6"/>

  <!-- Circuit stems descending from brain -->
  <line x1="28" y1="42" x2="28" y2="56" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="42" y2="63" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="57" y1="42" x2="57" y2="56" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Horizontal bus connecting stems -->
  <line x1="18" y1="56" x2="67" y2="56" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Short vertical stubs at bus ends -->
  <line x1="18" y1="50" x2="18" y2="56" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="67" y1="50" x2="67" y2="56" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Top branches rising from brain -->
  <line x1="28" y1="22" x2="28" y2="15" stroke="#0d9488" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="57" y1="22" x2="57" y2="15" stroke="#0d9488" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Endpoint dots — teal-400 (#2dd4bf) -->
  <circle cx="18" cy="50" r="3.2" fill="#2dd4bf"/>
  <circle cx="67" cy="50" r="3.2" fill="#2dd4bf"/>
  <circle cx="42" cy="63" r="3.2" fill="#2dd4bf"/>
  <circle cx="28" cy="15" r="2.8" fill="#2dd4bf"/>
  <circle cx="57" cy="15" r="2.8" fill="#2dd4bf"/>

  <!-- Small accent dot — orange-ish for visual interest like original -->
  <circle cx="42" cy="22" r="2.2" fill="#f59e0b"/>
</svg>
