<svg viewBox="0 0 200 215" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ══════════════════════════════════════════════════════════════════
       HEAD SILHOUETTE — right-facing teal profile
       (back of head left, face right, neck flows to bottom-right)
       ══════════════════════════════════════════════════════════════════ -->
  <path
    d="M 100 195
       L 100 160
       C 84 154 70 142 62 126
       C 52 108 50 88 58 70
       C 66 52 82 38 100 30
       C 118 22 140 24 156 36
       C 170 46 180 64 178 84
       C 176 102 166 118 152 130
       C 140 140 128 146 118 152
       L 118 162
       C 112 168 108 178 104 190
       C 102 192 101 194 100 195 Z"
    fill="#0d9488"
  />

  <!-- ── Flowing neck / data-stream swoops (bottom-left) ───────────── -->
  <path d="M 88 164 C 78 172 66 180 56 188 C 50 194 46 200 44 206"
        stroke="#0d9488" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M 80 158 C 70 164 60 170 52 176 C 46 180 42 184 40 188"
        stroke="#0d9488" stroke-width="7"  stroke-linecap="round" fill="none"/>
  <path d="M 72 153 C 62 158 54 162 46 166 C 40 170 36 172 34 174"
        stroke="#0d9488" stroke-width="5"  stroke-linecap="round" fill="none"/>

  <!-- ══════════════════════════════════════════════════════════════════
       BRAIN LOBES — same teal family, slightly deeper so they read
       as separate on top of the head silhouette
       ══════════════════════════════════════════════════════════════════ -->
  <ellipse cx="92"  cy="80" rx="30" ry="25" fill="#0b8a7e"/>
  <ellipse cx="132" cy="78" rx="24" ry="21" fill="#0b8a7e"/>

  <!-- Centre groove (teal gap between hemispheres) -->
  <path d="M 112 55 C 110 64 110 72 112 80 C 114 88 115 92 113 98"
        stroke="#0d9488" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Gyri folds — subtle white arcs suggesting brain surface -->
  <path d="M 72 70 C 80 62 94 65 98 73"
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M 78 85 C 86 78 100 80 104 88"
        stroke="white" stroke-width="2"   fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M 120 67 C 128 60 142 63 146 72"
        stroke="white" stroke-width="2"   fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- ══════════════════════════════════════════════════════════════════
       CIRCUIT TRACES — black PCB-style routes through the brain
       ══════════════════════════════════════════════════════════════════ -->

  <!-- Vertical stem (main junction → down) -->
  <line x1="96" y1="80"  x2="96" y2="108" stroke="#0c1210" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Horizontal elbow at y=108 → left -->
  <line x1="58" y1="108" x2="96" y2="108" stroke="#0c1210" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Left vertical leg up (y=108 → y=90) -->
  <line x1="58" y1="90"  x2="58" y2="108" stroke="#0c1210" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Far-left horizontal → exits head toward large dot -->
  <line x1="22" y1="90"  x2="58" y2="90"  stroke="#0c1210" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Secondary parallel horizontal branch at y=100 -->
  <line x1="58" y1="100" x2="96" y2="100" stroke="#0c1210" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right horizontal branch from main junction -->
  <line x1="96" y1="84"  x2="140" y2="84" stroke="#0c1210" stroke-width="3"   stroke-linecap="round"/>

  <!-- Right short vertical branch + T-end -->
  <line x1="130" y1="84"  x2="130" y2="98" stroke="#0c1210" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="122" y1="98"  x2="138" y2="98" stroke="#0c1210" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════════════════════════════
       JUNCTION DOTS — white circles at every trace corner/end
       ══════════════════════════════════════════════════════════════════ -->
  <circle cx="96"  cy="80"  r="6"   fill="white"/>
  <circle cx="96"  cy="100" r="4"   fill="white"/>
  <circle cx="96"  cy="108" r="4.5" fill="white"/>
  <circle cx="58"  cy="90"  r="5"   fill="white"/>
  <circle cx="58"  cy="100" r="3.5" fill="white"/>
  <circle cx="58"  cy="108" r="4"   fill="white"/>
  <circle cx="140" cy="84"  r="4.5" fill="white"/>
  <circle cx="130" cy="98"  r="3.5" fill="white"/>
  <circle cx="122" cy="98"  r="3"   fill="white"/>
  <circle cx="138" cy="98"  r="3"   fill="white"/>

  <!-- ══════════════════════════════════════════════════════════════════
       LARGE BLACK TERMINAL DOT — left of head (PCB endpoint)
       ══════════════════════════════════════════════════════════════════ -->
  <circle cx="18" cy="90" r="16" fill="#0c1210"/>

</svg>
